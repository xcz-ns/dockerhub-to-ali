name: Docker 镜像推送

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 3,6'
  push:
    branches:
      - '**'
    paths:
      - 'images.txt'

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"
  TG_BOT_TOKEN: "${{ secrets.TG_BOT_TOKEN }}"
  TG_CHAT_ID: "${{ secrets.TG_CHAT_ID }}"
  # 全局超时配置，杜绝无限卡死
  DOCKER_CMD_TIMEOUT: 300s
  SINGLE_IMAGE_TIMEOUT: 600s
  CURL_CONNECT_TIMEOUT: 10
  CURL_MAX_TIMEOUT: 30

jobs:
  build:
    name: 拉取镜像并推送至阿里云
    runs-on: ubuntu-latest
    # 单Job全局超时兜底，绝对不会跑满6小时
    timeout-minutes: 120
    steps:
    - name: 初始化时间与日志
      run: |
        echo "start_time=$(date +%s)" >> $GITHUB_ENV
        > new_images_success.log
        > new_images_failed.log

    - name: 【关键】暴力清理预装无用软件，释放根目录空间
      run: |
        # 彻底删除大体积预装软件，释放10GB+根目录空间
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
        sudo apt-get clean
        sudo apt-get autoremove -y
        sudo rm -rf /var/lib/apt/lists/*

    - name: 清理磁盘空间前的状态
      run: df -hT

    - name: 安装依赖工具（零空间残留优化版）
      run: |
        sudo apt-get update -o Dir::Cache::Archives=/tmp/apt_archives --no-install-recommends
        sudo apt-get install -y --no-install-recommends jq
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/* /tmp/apt_archives

    - name: 最大化Docker构建空间
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        remove-android: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: 重启 Docker 服务，加载新挂载
      run: sudo service docker restart

    - name: 获取代码
      uses: actions/checkout@v4

    - name: 配置 Buildx
      uses: docker/setup-buildx-action@v3

    - name: 构建并推送镜像到阿里云 (含Latest标签)
      run: |
        set +e
        # 先校验阿里云登录，登录失败直接终止
        docker login -u $ALIYUN_REGISTRY_USER -p $ALIYUN_REGISTRY_PASSWORD $ALIYUN_REGISTRY
        if [ $? -ne 0 ]; then
          echo "阿里云镜像仓库登录失败，终止任务"
          exit 1
        fi

        today_tag=$(date +'%m%d')
        declare -A duplicate_images
        declare -A temp_map

        # 检查重复镜像 (处理命名空间冲突)
        while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^\s*# ]] && continue
            image=$(echo "$line" | awk '{print $NF}')
            image="${image%%@*}"
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            name_space="${name_space}_"
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
            if [[ -n "${temp_map[$image_name]}" ]]; then
                if [[ "${temp_map[$image_name]}" != $name_space ]]; then
                    duplicate_images[$image_name]="true"
                fi
            else
                temp_map[$image_name]=$name_space
            fi
        done < images.txt

        # 拉取、Tag、推送 (主逻辑，全链路超时兜底)
        while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^\s*# ]] && continue
            
            # 单镜像处理超时兜底，10分钟没完成直接跳过
            (
              # 1. 拉取镜像，超时5分钟，最多重试2次
              timeout $DOCKER_CMD_TIMEOUT docker pull $line || {
                echo "$line" >> new_images_failed.log
                exit 1
              }

              # 2. 解析变量
              platform=$(echo "$line" | awk -F'--platform[ =]' '{if (NF>1) print $2}' | awk '{print $1}')
              platform_prefix=""
              [[ -n "$platform" ]] && platform_prefix="${platform//\//_}_"

              image=$(echo "$line" | awk '{print $NF}')
              image="${image%%@*}"
              image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
              name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
              image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
              name_space_prefix=""
              if [[ -n "${duplicate_images[$image_name]}" && -n "$name_space" ]]; then
                name_space_prefix="${name_space}_"
              fi

              # 3. 定义目标镜像名 (日期标签 + Latest标签)
              target_image_full_name="$platform_prefix$name_space_prefix$image_name"
              target_image_base="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$target_image_full_name"
              image_with_date="$target_image_base:$today_tag"
              image_with_latest="$target_image_base:latest"

              # 4. 打标签
              docker tag "$image" "$image_with_date" || {
                echo "$image (Tag Date)" >> new_images_failed.log
                exit 1
              }
              docker tag "$image" "$image_with_latest" || {
                echo "$image (Tag Latest)" >> new_images_failed.log
                exit 1
              }

              # 5. 推送 (先推日期，成功后推Latest，超时兜底)
              push_ok=0
              if timeout $DOCKER_CMD_TIMEOUT docker push "$image_with_date"; then
                if timeout $DOCKER_CMD_TIMEOUT docker push "$image_with_latest"; then
                  echo "$image_with_latest" >> new_images_success.log
                  push_ok=1
                fi
              fi

              if [ $push_ok -ne 1 ]; then
                echo "$image" >> new_images_failed.log
                docker rmi "$image" "$image_with_date" "$image_with_latest" 2>/dev/null || true
                exit 1
              fi

              # 6. 清理本地缓存
              docker rmi "$image" "$image_with_date" "$image_with_latest" 2>/dev/null || true

              # 7. 保留最近10个镜像，删除老镜像 (修复API地址bug，带前缀匹配)
              old_images=$(curl -s \
                --connect-timeout $CURL_CONNECT_TIMEOUT \
                --max-time $CURL_MAX_TIMEOUT \
                -u "$ALIYUN_REGISTRY_USER:$ALIYUN_REGISTRY_PASSWORD" \
                "https://$ALIYUN_REGISTRY/v2/$ALIYUN_NAME_SPACE/$target_image_full_name/tags/list" \
                | jq -r '.tags[] | select(. != "'"$today_tag"'" and . != "latest")' | sort -r 2>/dev/null || echo "")
              
              count=0
              for tag in $old_images; do
                count=$((count+1))
                if [ $count -ge 10 ]; then
                  echo "删除旧镜像: $target_image_base:$tag"
                  curl -s -X DELETE \
                    --connect-timeout $CURL_CONNECT_TIMEOUT \
                    --max-time $CURL_MAX_TIMEOUT \
                    -u "$ALIYUN_REGISTRY_USER:$ALIYUN_REGISTRY_PASSWORD" \
                    "https://$ALIYUN_REGISTRY/v2/$ALIYUN_NAME_SPACE/$target_image_full_name/manifests/$tag" 2>/dev/null || true
                fi
              done
              exit 0
            ) &
            wait $!
            # 单镜像处理超时，写入失败日志
            if [ $? -eq 124 ]; then
              echo "$line (处理超时)" >> new_images_failed.log
              continue
            fi

        done < images.txt

    - name: 发送构建状态和镜像列表到 Telegram
      if: always()
      run: |
        end_time=$(date +%s)
        duration_sec=$(( end_time - start_time ))
        duration_min=$(( duration_sec / 60 ))
        duration_rem=$(( duration_sec % 60 ))
        DURATION="${duration_min}分${duration_rem}秒"
        STATUS="${{ job.status }}"
        
        MSG="🧱 *Docker Image Pusher任务*\n"
        MSG+="⏱️ 耗时：$DURATION\n"
        MSG+="📅 时间：$(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M:%S")\n"
        MSG+="✅ 状态：$STATUS\n\n"
        
        if [ -s new_images_success.log ]; then
          MSG+="📦 *成功推送到阿里云的镜像：*\n"
          while read -r line; do
            MSG+="- \`$line\`\n"
          done < new_images_success.log
        fi
        
        if [ -s new_images_failed.log ]; then
          MSG+="\n🚫 *推送失败的镜像：*\n"
          while read -r line; do
            MSG+="- \`$line\`\n"
          done < new_images_failed.log
        fi
        
        # Telegram推送加超时兜底，避免卡死
        curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
          --connect-timeout $CURL_CONNECT_TIMEOUT \
          --max-time $CURL_MAX_TIMEOUT \
          -d chat_id="$TG_CHAT_ID" \
          -d parse_mode=Markdown \
          --data-urlencode "text=$(printf '%b' "${MSG}")"

    - name: 删除旧的 Workflow 运行记录
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.REPO_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 3
        keep_minimum_runs: 5
